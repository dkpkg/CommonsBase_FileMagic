name: CommonsBase_FileMagic@2.5.x
on:
  push:
    tags:
      - '2.5.*' # secrets are tied to version 2.5
  workflow_dispatch: # allow manual triggering from GitHub page

jobs:
  distribute:
    # The secrets created by `dksrc/dk0 prepare-version --ci github VERSION`
    # are tied to this environment only.
    environment: dk-distribution

    strategy:
      fail-fast: false
      matrix:
        include:
            # curl and build-essential are part of ubuntu-24.04 CI runner, so test with:
            #   docker run -v .:/work --workdir /work -it ubuntu:24.04 bash -c "apt update && apt install -y curl build-essential && sh ./dk0 distribute --actual-in-place --library CommonsBase_LLVM@2.5.99 part1 dist-any.u"
            #   docker run -v .:/work --workdir /work -it quay.io/pypa/manylinux_2_28_x86_64:2026.04.08-5 sh ./dk0 distribute --actual-in-place --library CommonsBase_LLVM@2.5.99 part1 dist-any.u
          - runs-on: ubuntu-latest
            distscript: dist-Linux_x86.u
            #   RedHat only distributes date versioned manylinux images for a few months.
            #   https://quay.io/repository/pypa/manylinux_2_28_i686?tab=tags&tag=latest to
            #   get a new version.
            #   Also, NodeJS 24 is required for GitHub Actions, but NodeJS 24 does not support 32-bit Linux.
            #   So the host must be 64-bit Linux
            image: quay.io/pypa/manylinux_2_28_x86_64:2026.04.08-5 # glibc 2.28 + gcc 14.2.1: old glibc is highly compatible and works with Node v24.14.0; system gcc will not be needed once GCC bootstrapped in dk0.
            # image: quay.io/pypa/manylinux_2_28_i686:2026.04.08-5 # glibc 2.28 + gcc 14.2.1: old glibc is highly compatible and works with Node v24.14.0; system gcc will not be needed once GCC bootstrapped in dk0.
          - runs-on: ubuntu-latest
            distscript: dist-Linux_x86_64.u
            #   RedHat only distributes date versioned manylinux images for a few months.
            #   https://quay.io/repository/pypa/manylinux_2_28_x86_64?tab=tags&tag=latest to
            #   get a new version.
            image: quay.io/pypa/manylinux_2_28_x86_64:2026.04.08-5 # glibc 2.28 + gcc 14.2.1: old glibc is highly compatible and works with Node v24.14.0; system gcc will not be needed once GCC bootstrapped in dk0.
          - runs-on: ubuntu-24.04-arm
            distscript: dist-Linux_arm64.u
            #   BOOTSTRAP ALERT: Until dk0 is bootstrapped with native Linux arm64 support, we have to build dk0 arm64 with ocaml/setup-ocaml
            experimental-mlfront-ref: true
            #   RedHat only distributes date versioned manylinux images for a few months.
            #   https://quay.io/repository/pypa/manylinux_2_28_aarch64?tab=tags&tag=latest to
            #   get a new version.
            image: quay.io/pypa/manylinux_2_28_aarch64:2026.04.08-5 # glibc 2.28 + gcc 14.2.1: old glibc is highly compatible and works with Node v24.14.0; system gcc will not be needed once GCC bootstrapped in dk0.
          - runs-on: macos-latest
            distscript: dist-Darwin_arm64.u
          - runs-on: macos-latest
            distscript: dist-Darwin_x86_64.u
          - runs-on: windows-latest
            distscript: dist-Windows_x86.u
          - runs-on: windows-latest
            distscript: dist-Windows_x86_64.u
          - runs-on: windows-latest
            distscript: dist-Windows_arm64.u

    runs-on: ${{ matrix.runs-on }}
    container:
      image: ${{ matrix.image }}

    steps:
      - name: Harden Runner # Optional but recommended
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with: { egress-policy: audit }
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare Linux static toolchain
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          pkgs=(glibc-static)
          if [ "${{ matrix.distscript }}" = 'dist-Linux_x86.u' ]; then
            pkgs+=(glibc-static.i686 glibc-devel.i686 libgcc.i686 libstdc++.i686 gcc-toolset-14-libstdc++-devel.i686)
          fi
          dnf install -y "${pkgs[@]}"

      - name: Check if bwrap available for sandboxing
        id: check-bwrap
        if: ${{ matrix.experimental-mlfront-ref }}
        shell: bash
        run: |
          if [ "${{ runner.os }}" != "Linux" ]; then
            echo "disable_sandboxing=false" | tee -a "$GITHUB_OUTPUT"
            exit 0
          fi
          if command -v bwrap > /dev/null 2>&1; then
            echo "disable_sandboxing=false" | tee -a "$GITHUB_OUTPUT"
          else
            echo "disable_sandboxing=true" | tee -a "$GITHUB_OUTPUT"
          fi

      - name: Set-up OCaml
        if: ${{ matrix.experimental-mlfront-ref }}
        uses: ocaml/setup-ocaml@57d9aa353e8d39677b1b9fc39637d48f27fe4a91 # v3
        with:
          ocaml-compiler: 5.4.0
          opam-disable-sandboxing: ${{ steps.check-bwrap.outputs.disable_sandboxing == 'true' }}
          opam-repositories: |
            default: git+https://github.com/ocaml/opam-repository.git#93d44806c4a413399879355cb22fb53ba00a1ba5
          cache-prefix: dk-distribute-v2

      - name: Get MlFront
        if: ${{ matrix.experimental-mlfront-ref }}
        shell: bash
        run: |
          git clone https://gitlab.com/dkml/build-tools/MlFront.git
          cd MlFront
          git reset --hard HEAD

          sh ci/localize-pristine.sh
          git config user.email "nobody@example.com"
          git config user.name "nobody"
          git add --force dune-project *.opam
          git commit -m "pristine"

      - name: Pin Latest MlFront
        if: ${{ matrix.experimental-mlfront-ref }}
        shell: bash
        run: cd MlFront && opam pin . --no-action -y

      - name: Install DkZero_Exec
        if: ${{ matrix.experimental-mlfront-ref }}
        shell: bash
        run: cd MlFront && opam install ./DkZero_Exec.opam -y

      - name: Create repository dk0 wrapper on Unix
        if: ${{ runner.os != 'Windows' && matrix.experimental-mlfront-ref }}
        shell: bash
        run: |
          cat > .ci-dk0 <<'EOF'
          #!/bin/sh
          set -euf
          DK_PROJECT_DIR=$(CDPATH= cd -- "$(dirname "$0")" && pwd)
          exec opam exec -- dk0 \
            -isystem "$DK_PROJECT_DIR/etc/dk/i" \
            --cell "dk0=$DK_PROJECT_DIR" \
            "$@"
          EOF
          chmod +x .ci-dk0

      - name: Cache restore dk stores
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: restore-cache-dk-distribute
        with:
          enableCrossOsArchive: true
          path: t
          key: dk-stores-and-keys-x1-2.5-${{ github.run_id }}
          restore-keys: dk-stores-and-keys-x1-2.5

      - name: Distribute Modules on Unix
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DK_BUILD_PUBKEY: "${{ secrets.distribute_2_5_pubkey }}"
          DK_BUILD_SECKEY: "${{ secrets.distribute_2_5_seckey }}"
        run: |
          if [ "${{ matrix.experimental-mlfront-ref }}" = "true" ]; then
            DK0=./.ci-dk0
          else
            DK0=./dk0
          fi
          PART='${{ matrix.distscript }}'
          PART="${PART%%.*}"
          TRUST_ARGS='--trust-local-package CommonsBase_Std --trust-local-package CommonsBase_LLVM'

          rm -rf etc/dk/i
          echo "sh $DK0 --errors-plain -nosysinc -I etc/dk/i $TRUST_ARGS --keys-env DK_BUILD update"
          sh "$DK0" --errors-plain -nosysinc -I etc/dk/i $TRUST_ARGS --keys-env DK_BUILD update

          echo "sh $DK0 --errors-plain -nosysinc -I etc/dk/i $TRUST_ARGS --keys-env DK_BUILD --verbose distribute CommonsBase_FileMagic-$PART --library CommonsBase_FileMagic@${{ github.ref_name }} ${{ matrix.distscript }}"
          sh "$DK0" --errors-plain -nosysinc -I etc/dk/i $TRUST_ARGS --keys-env DK_BUILD --verbose distribute CommonsBase_FileMagic-"$PART" --library CommonsBase_FileMagic@${{ github.ref_name }} ${{ matrix.distscript }}

          du -sh dk-dist/*

      - name: Query traces on Unix
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        env:
          DK_BUILD_PUBKEY: "${{ secrets.distribute_2_5_pubkey }}"
          DK_BUILD_SECKEY: "${{ secrets.distribute_2_5_seckey }}"
          OCAMLRUNPARAM: b
        run: |
          if [ "${{ matrix.experimental-mlfront-ref }}" = "true" ]; then
            DK0=./.ci-dk0
          else
            DK0=./dk0
          fi
          sh "$DK0" --errors-plain -nosysinc -I etc/dk/i --trust-local-package CommonsBase_Std --trust-local-package CommonsBase_LLVM --keys-env DK_BUILD query

      - name: Distribute Modules on Windows
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          DK_BUILD_PUBKEY: "${{ secrets.distribute_2_5_pubkey }}"
          DK_BUILD_SECKEY: "${{ secrets.distribute_2_5_seckey }}"
        run: |
          $part = '${{ matrix.distscript }}'
          $part = $part.Substring(0, $part.LastIndexOf('.'))
          $trustArgs = @('--trust-local-package', 'CommonsBase_Std', '--trust-local-package', 'CommonsBase_LLVM')
          if (Test-Path etc/dk/i) { Remove-Item -Recurse -Force etc/dk/i }

          Write-Host ".\dk0.cmd --errors-plain -nosysinc -I etc\dk\i --trust-local-package CommonsBase_Std --trust-local-package CommonsBase_LLVM --keys-env DK_BUILD update"
          .\dk0.cmd --errors-plain -nosysinc -I etc\dk\i @trustArgs --keys-env DK_BUILD update
          if ($LASTEXITCODE -ne 0) {
            throw "dk0 update failed with exit code $LASTEXITCODE"
          }

          Write-Host ".\dk0.cmd --errors-plain -nosysinc -I etc\dk\i --trust-local-package CommonsBase_Std --trust-local-package CommonsBase_LLVM --keys-env DK_BUILD --verbose distribute CommonsBase_FileMagic-$part --library CommonsBase_FileMagic@${{ github.ref_name }} ${{ matrix.distscript }}"
          .\dk0.cmd --errors-plain -nosysinc -I etc\dk\i @trustArgs --keys-env DK_BUILD --verbose distribute CommonsBase_FileMagic-$part --library CommonsBase_FileMagic@${{ github.ref_name }} ${{ matrix.distscript }}
          if ($LASTEXITCODE -ne 0) {
            throw "dk0 distribute failed with exit code $LASTEXITCODE"
          }

          Get-ChildItem -Directory dk-dist | ForEach-Object {
            $size = (Get-ChildItem $_.FullName -Recurse -File | Measure-Object -Property Length -Sum).Sum
            $sizeGB = [math]::Round($size / 1GB, 2)
            Write-Output "$($sizeGB) GB`t$($_.Name)"
          }

      - name: Query traces on Windows
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        env:
          DK_BUILD_PUBKEY: "${{ secrets.distribute_2_5_pubkey }}"
          DK_BUILD_SECKEY: "${{ secrets.distribute_2_5_seckey }}"
          OCAMLRUNPARAM: b
        run: |
          .\dk0.cmd --errors-plain -nosysinc -I etc\dk\i --trust-local-package CommonsBase_Std --trust-local-package CommonsBase_LLVM --keys-env DK_BUILD query
          if ($LASTEXITCODE -ne 0) {
            throw "dk0 query failed with exit code $LASTEXITCODE"
          }

      - name: Save logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: logs-${{ matrix.distscript }}
          path: t/p/*/*/l/*/

      - name: Share distribution artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: distribution-${{ matrix.distscript }}
          path: dk-dist/

      - name: Cache save dk stores
        if: steps.restore-cache-dk-distribute.outputs.cache-hit == ''
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          enableCrossOsArchive: true
          path: t
          key: dk-stores-and-keys-x1-2.5-${{ github.run_id }}

  combine:
    needs: distribute
    permissions:
      contents: write # for action-gh-release
      id-token: write # for actions/attest-build-provenance
      attestations: write # for actions/attest-build-provenance
      #   required but does not work in `act`! bug: https://github.com/nektos/act/issues/6025
      artifact-metadata: write # for actions/attest-build-provenance

    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner # Optional but recommended
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with: { egress-policy: audit }
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Combine Modules
        uses: diskuv/dk-distribute/combine@v2

      - name: Attest
        id: attest
        uses: actions/attest-build-provenance@v3
        with: { subject-path: dk-dist/* }

      - name: Release ${{ github.job }}
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1. Mar 15, 2026
        with: { files: dk-dist/*, body_path: ".dist-CHANGELOG.txt" }
